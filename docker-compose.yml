version: '3.8'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: sankyu_assets
      POSTGRES_USER: sankyu
      POSTGRES_PASSWORD: sankyu123
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://sankyu:sankyu123@db:5432/sankyu_assets
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - ./Est-Depreciation_Calculation_for_2026_.xlsx:/data/assets.xlsx
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
volumes:
  postgres_data:
